<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>欢迎来到 Boxland</title>
    <style>
        html, body { 
            height: 100vh; margin:0; padding:0; background: #212121; color: #f5f5f5; font-family: "微软雅黑",Arial,sans-serif;
        }
        .home-root {
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #3c6e71 10%, #70a9a1 90%);
        }
        .title {
            font-size: 3.2em;
            letter-spacing: 0.08em;
            margin-bottom: 0.2em;
            margin-top: 0;
        }
        .subtitle {
            font-size: 1.7em;
            color:#fffbb5;
            margin-bottom: 1.2em;
            text-shadow: 0 2px 8px #0009;
        }
        .start-btn {
            background: linear-gradient(90deg,#388e3c,#81c784);
            color:#222; border-radius: 1.8em; border:none;
            padding: 1em 3em; font-size:2em; cursor:pointer;
            font-family: inherit; font-weight:bold;
            margin-top:1.8em;
            transition:background 0.2s, box-shadow 0.2s;
            box-shadow:0 8px 18px #31514e60;
        }
        .start-btn:hover { background:#aed581; color:#333; box-shadow:0 7px 40px #31514e90; }
        .author { opacity:.83; margin-top: 2.8em; font-size:1.15em; color:#eee;}
        .tips {
            margin-top:1.8em; font-size:1em; color:#f6f6f670;
            font-family:consolas,monospace;}
        a { color:inherit;text-decoration:none;}
    </style>
</head>
<body>
<div class="home-root">
    <div>
        <div class="title">Boxland</div>
        <div class="subtitle">三维沙盒复刻 · Minecraft简易网页版</div>
        <button class="start-btn" onclick="location.href='game.html'">进入游戏</button>
        <div class="tips">建议电脑端游玩 · 推荐Chrome/Edge/Firefox</div>
        <div class="author">作者：<a href="https://github.com/Daniel-Tigey" target="_blank">Daniel-Tigey</a>
            | Powered by Three.js + Vue + Copilot</div>
    </div>
</div>
</body>
</html>
